<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Falling Objects Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="score-board">
            <p id="timer-label">Time: <span id="timer">30</span></p>
            <p>Score: <span id="score">0</span></p>
            <p>Misses: <span id="misses">0</span></p>
        </div>
        <div id="difficulty-selection">
            <h2>Select Difficulty:</h2>
            <button id="easy-button">Easy</button>
            <button id="medium-button">Medium</button>
            <button id="hard-button">Hard</button>
            <p>High Score: <span id="high-score">0</span></p>
        </div>
        <div id="game-over-screen">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <p>Final Misses: <span id="final-misses">0</span></p>
            <div id="name-entry">
                <p>Enter 3 initials:</p>
                <input id="initials-input" type="text" maxlength="3" placeholder="AAA">
                <button id="save-score-button">Save Score</button>
            </div>
            <h3>Arcade Scores</h3>
            <table id="arcade-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>INI</th>
                        <th>SCORE</th>
                        <th>MISS</th>
                    </tr>
                </thead>
                <tbody id="arcade-body"></tbody>
            </table>
            <button id="restart-button">Play Again</button>
            <p>High Score: <span id="final-high-score">0</span></p>
        </div>
    </div>
    <!-- Sound effects -->
    <audio id="golden-sound" src="sounds/golden.mp3"></audio>
    <audio id="bomb-sound" src="sounds/bomb.mp3"></audio>
    <audio id="catch-sound" src="sounds/catch.mp3"></audio>
    <audio id="miss-sound" src="sounds/miss.mp3"></audio>
    <audio id="game-over-sound" src="sounds/game-over.mp3"></audio>

    <script src="dist/main.js" type="module"></script>
</body>
</html>
