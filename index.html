<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Falling Objects Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="score-board">
            <p id="timer-label">Tiempo: <span id="timer">30</span></p>
            <p>Puntuación: <span id="score">0</span></p>
        </div>
        <p id="high-score-panel">Puntuación Máxima: <span id="high-score">0</span></p>
        <div id="game-over-screen">
            <h2>¡Juego Terminado!</h2>
            <p>Puntuación Final: <span id="final-score">0</span></p>
            <div id="name-entry">
                <p>Ingresa tu nombre:</p>
                <input id="initials-input" type="text" maxlength="30" placeholder="Tu nombre">
                <button id="save-score-button">Guardar Puntuación</button>
            </div>
            <h3>Puntuaciones del Arcade</h3>
            <table id="arcade-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>NOMBRE</th>
                        <th>PUNTUACIÓN</th>
                    </tr>
                </thead>
                <tbody id="arcade-body"></tbody>
            </table>
            <button id="restart-button">Jugar de Nuevo</button>
            <p>Puntuación Máxima: <span id="final-high-score">0</span></p>
        </div>
    </div>
    <!-- Sound effects -->
    <audio id="golden-sound" src="sounds/golden.mp3"></audio>
    <audio id="bomb-sound" src="sounds/bomb.mp3"></audio>
    <audio id="catch-sound" src="sounds/catch.mp3"></audio>
    <audio id="miss-sound" src="sounds/miss.mp3"></audio>
    <audio id="game-over-sound" src="sounds/game-over.mp3"></audio>

    <script src="dist/main.js" type="module"></script>
</body>
</html>
